<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>American Dream — The World's Most Valuable Commercial Stage</title>
  <meta name="description" content="North America's largest entertainment and retail destination. 40M visitors. 3M sqft. 16 minutes from Manhattan."/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Cormorant', 'Georgia', 'serif'],
            sans: ['DM Sans', 'sans-serif'],
            syne: ['Syne', 'sans-serif'],
          },
          colors: {
            ink: { DEFAULT: '#080809', 2: '#101012', 3: '#18181c', 4: '#222228', 5: '#2c2c34' },
            gold: { DEFAULT: '#C9933A', light: '#E5B660', dark: '#9B6E22', pale: '#F0D9A8', dim: '#6B4E1A' },
            cream: { DEFAULT: '#F0EBE0', muted: '#9A9488', dim: '#4A4742' },
          },
          backgroundImage: {
            'gold-gradient': 'linear-gradient(135deg, #9B6E22, #C9933A, #E5B660)',
            'dark-vignette': 'radial-gradient(ellipse at center, transparent 30%, rgba(8,8,9,0.8) 100%)',
          }
        }
      }
    }
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- External Stylesheets -->
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>

  <!-- External Scripts -->
  <script type="text/babel" src="script.js"></script>
</body>
</html>
